<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — WMS</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <img src="/images/logo.png" alt="logo" style="width:72px; height:72px; object-fit:contain;" />
      </div>
      <h1>CallMe F&amp;L</h1>
    </div>

    <div class="login-error" id="login-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" type="email" id="email" placeholder="admin@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button class="btn btn-primary login-btn" type="submit" id="submit-btn">Sign In</button>
    </form>
  </div>
</div>

<script src="./js/api.js"></script>
<script>
  if (DEMO_MODE || getToken()) window.location.href = '/dashboard.html';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn   = document.getElementById('submit-btn');
    const errEl = document.getElementById('login-error');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errEl.style.display = 'none';

    try {
      await Auth.login(email, password);
      window.location.href = '/dashboard.html';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
